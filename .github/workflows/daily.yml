name: Daily AI Brief

on:
  schedule:
    # 09:00 Beijing time, 01:00 UTC.
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional run date, YYYY-MM-DD"
        required: false
        type: string
      offline:
        description: "Skip network fetching and only process manual input"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
      SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate daily brief
        run: |
          args=()
          if [ -n "${{ inputs.date }}" ]; then
            args+=(--date "${{ inputs.date }}")
          fi
          if [ "${{ inputs.offline }}" = "true" ]; then
            args+=(--offline)
          fi
          python scripts/run_daily.py "${args[@]}"

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "chore: update daily AI brief"
            git push
          fi

